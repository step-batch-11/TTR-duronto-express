<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waiting Room</title>

  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f9;
    }

    .container {
      background: white;
      padding: 2em;
      border-radius: 10px;
      width: 400px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      padding: 5px 0;
    }

    .start {
      margin-top: 1em;
      font-size: 20px;
      color: green;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Room ID: <span id="room-id"></span></h2>

    <p>
      Players: <span id="player-count"></span> /
      <span id="max-players"></span>
    </p>

    <ul id="players-list"></ul>

    <div class="start" id="start-msg"></div>
  </div>

  <script type="module" src="./scripts/waiting_room.js"></script>
</body>

</html>
