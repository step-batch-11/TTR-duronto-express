<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/victory.css">
  <script type="module" src="scripts/leaderboard.js"></script>
  <title>TTR</title>
</head>

<body>
  <template id="winner-template">
    <div class="winner">
      <h1>Winner</h1>
      <h2 id="winner-name">
      </h2>
    </div>
  </template>
  <table id="victory-table">
    <thead id="victory-table-head">
      <tr>
        <th>Player</th>
        <th>Road Points</th>
        <th>Ticket Points</th>
        <th>Bonus Points</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="victory-table-body">
    </tbody>
  </table>

  <template id="row-template">
    <tr class="row"></tr>
  </template>

  <template id="row-data-template">
    <td class="row-data"></td>
  </template>
</body>

</html>
