<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    h1 {
      display: flex;
      justify-content: center;
    }
  </style>
  <script type="module" src="scripts/join_room.js"></script>
</head>

<body>
  <main>
    <section>
      <h1>Join</h1>
      <form>
        <label for="joinRoom">Room Id:</label>
        <input type="text" pattern="[0-9]{4}" required name="roomId" maxlength="4"
          title="Room Id must be 4 digit long" />
        <button class="join" type="submit">Join</button>
      </form>
    </section>
  </main>
</body>

</html>
