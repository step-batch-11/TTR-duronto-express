<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTR</title>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/map.css">
  <link rel="stylesheet" href="styles/profile.css ">
  <link rel="icon" href="assets/apple-touch-icon.png" type="image/png">
  <script src="https://cdn.jsdelivr.net/npm/lodash@4.18.1/lodash.min.js"></script>
  <script type="module" src="scripts/script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=logout" />
</head>

<body>
  <dialog id="alert-box">
    <p></p>
  </dialog>
  <!-- <span class="material-symbols-outlined" id="exit-game">
    logout
  </span> -->
  <template id="user">
    <div class="user">
      <div class="identifier">
        <h2 class="name"></h2>
        <div class="symbol"></div>
      </div>

      <div class="player-data">
        <div class="train-car-data">
          <img src="assets/train-shape.svg" alt="car">
          <p class="car-count"></p>
        </div>
        <div class="ticket-data">
          <img src="assets/golden-ticket.png" alt="ticket">
          <p class="ticket-count"></p>
        </div>
      </div>

    </div>
  </template>
  <main>
    <aside class="players">
      <div class="player-details"></div>
      <div class="log"></div>
    </aside>

    <article id="map">
    </article>
    <aside class="market">
      <div class="faceup-cards">
      </div>
      <div class="ticket-cards hidden">
      </div>
      <template id="btn">
        <button type="button" class="claim-button">
        </button>
      </template>
      <template id="market-card">
        <div class="card">
          <img src="" alt="" class="card-img">
        </div>
      </template>
      <div class="deck">
        <img src="assets/deck-images/car-card.png" id="deck-img" alt="">
      </div>
    </aside>
  </main>
  <div class="footer">
    <div class="hand-destination-tickets">
      <div class="container">
      </div>
      <div class="buttons-container">
        <div class="ticket-counter"></div>
      </div>
    </div>

    <template id="card">
      <div class="hand-car-card">
        <span class="card-count"></span>
        <div class="img-container">
          <img class="card-img" src="" alt="">
        </div>
      </div>
    </template>


    <template id="build-route-template">
      <div class="build-route-container">
        <div class="build-actions">
          <button id="build" class="click-disabled">Build</button>
          <button id="cancel">Cancel</button>
        </div>
        <div class="possible-cards">
          <div class="hand-car-card" id="color-card">
            <span class="card-count"></span>
            <div class="build-img-container card-placeholder">
            </div>
          </div>
          <div class="hand-car-card" id="wild-card">
            <span class="card-count"></span>
            <div class="build-img-container card-placeholder">
            </div>
          </div>
        </div>
      </div>
    </template>

    <template id="dest-ticket">
      <div class="destination-tickets-deck-container">
        <div class="destination-tickets-deck">
          <img src="assets/deck-images/destination-card.png" alt="">
        </div>
      </div>
    </template>
  </div>
</body>

</html>
