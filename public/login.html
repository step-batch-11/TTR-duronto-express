<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="styles/general.css">
  <script type="module" src="/scripts/login.js"></script>
  <style>
    .alert {
      color: red;
      font-size: 2em;
    }

    p {
      text-align: center;
    }
  </style>
</head>

<body>
  <main>
    <form action="/auth/login" method="post" id="login-form">
      <div class="outer-box">
        <label for="username" id="username-label">Enter Passenger Name</label>
        <input type="text" id="username" name="username" pattern="[A-Za-z]+[0-9]*" maxlength="10" autofocus required>
        <button type="submit">Check In</button>
      </div>
    </form>
    <p class="alert"></p>
  </main>
</body>

</html>
