<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host</title>
  <link rel="stylesheet" href="styles/lobby.css">
  <style>
    input{
      width: 100px;
      height: 50px;
      font-size: larger;
    }
  </style>
  <script type="module" src="scripts/create_room.js"></script>

<body>
  <main>
    <section>

        <input type="number" name="maxPlayer" id="maxPlayer" min="2" max="5" value="2" autofocus>

      </form>
    </section>
  </main>
